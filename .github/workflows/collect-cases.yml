name: Collect Legal Cases

on:
  schedule:
    # Run daily at 6 AM UTC (3 PM KST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: 'Country to collect (kr, us, or all)'
        required: false
        default: 'all'
      limit:
        description: 'Number of cases to collect per country'
        required: false
        default: '10'

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create scripts directory (not in repo)
        run: |
          mkdir -p scripts/collectors scripts/processors scripts/generators

      - name: Download collector scripts
        env:
          SCRIPTS_REPO: ${{ secrets.SCRIPTS_REPO_URL }}
        run: |
          # Scripts are managed separately - download from private location
          # This is a placeholder - actual script download logic depends on setup
          echo "Scripts should be provided via secrets or separate repository"

      - name: Collect cases
        env:
          KOREA_LAW_API_KEY: ${{ secrets.KOREA_LAW_API_KEY }}
          COURTLISTENER_API_KEY: ${{ secrets.COURTLISTENER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx tsx scripts/collect-cases.ts ${{ github.event.inputs.country || 'all' }} ${{ github.event.inputs.limit || '10' }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet content/cases/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/cases/
          git commit -m "chore: update legal cases [skip ci]"
          git push

      - name: Summary
        run: |
          echo "### Case Collection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Korea cases: $(ls -1 content/cases/kr/*.md 2>/dev/null | wc -l || echo 0)" >> $GITHUB_STEP_SUMMARY
          echo "- US cases: $(ls -1 content/cases/us/*.md 2>/dev/null | wc -l || echo 0)" >> $GITHUB_STEP_SUMMARY
